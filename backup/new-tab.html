<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <title>书签白板 | 快速整理你的网络资源</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="css/font-awesome.min.css" rel="stylesheet" />
    <link href="css/tailwind.css?v=11" rel="stylesheet" />
  </head>

  <body
    class="font-inter bg-gradient-to-br from-slate-50 to-indigo-50 dark:from-dark-bg dark:to-slate-900 min-h-screen text-slate-800 dark:text-slate-100 transition-colors duration-300"
  >
    <!-- 顶部导航栏 -->
    <header
      class="sticky top-0 z-50 bg-white/80 dark:bg-dark-bg/80 backdrop-blur border-b border-slate-200 dark:border-slate-700 shadow-sm transition-all duration-300"
    >
      <div
        class="container mx-auto px-4 py-3 flex items-center justify-between"
      >
        <div class="flex items-center gap-2">
          <i class="fa fa-th-large text-primary text-2xl"></i>
          <h1
            class="text-xl font-bold bg-gradient-to-r from-primary to-secondary bg-clip-text text-transparent"
          >
            书签白板
          </h1>
        </div>

        <div class="flex items-center gap-3">
          <!-- 搜索框 -->
          <div class="relative hidden md:block">
            <input
              type="text"
              id="search"
              placeholder="搜索书签..."
              class="pl-9 pr-4 py-2 rounded-full bg-slate-100 dark:bg-slate-700 border-0 focus:outline-none transition-all text-sm w-48 lg:w-64 search-input"
              style="background-image: url('data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 512 512\' fill=\'%2394a3b8\'><path d=\'M505 442.7L405.3 343c-4.5-4.5-10.6-7-17-7H372c27.6-35.3 44-79.7 44-128C416 93.1 322.9 0 208 0S0 93.1 0 208s93.1 208 208 208c48.3 0 92.7-16.4 128-44v16.3c0 6.4 2.5 12.5 7 17l99.7 99.7c9.4 9.4 24.6 9.4 33.9 0l28.3-28.3c9.4-9.4 9.4-24.6.1-34zM208 336c-70.7 0-128-57.2-128-128 0-70.7 57.2-128 128-128 70.7 0 128 57.2 128 128 0 70.7-57.2 128-128 128z\'/></svg>'); background-repeat: no-repeat; background-position: 12px center; background-size: 14px;"
            />
          </div>

          <!-- 移动端搜索按钮 -->
          <button
            id="mobileSearchBtn"
            class="md:hidden p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors"
          >
            <i class="fa fa-search"></i>
          </button>

          <!-- 批量操作按钮 -->
          <button
            id="batchBtn"
            class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors relative"
          >
            <i class="fa fa-cog"></i>
            <span
              id="selectedCount"
              class="absolute -top-1 -right-1 bg-accent text-white text-xs rounded-full w-5 h-5 flex items-center justify-center opacity-0 transition-opacity"
              >0</span
            >
          </button>

          <!-- 模式切换按钮 -->
          <button
            id="themeToggle"
            class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors"
          >
            <i class="fa fa-moon-o dark:hidden"></i>
            <i class="fa fa-sun-o hidden dark:inline"></i>
          </button>
        </div>
      </div>

      <!-- 移动端搜索框 -->
      <div id="mobileSearch" class="md:hidden px-4 pb-3 hidden">
        <input
          type="text"
          placeholder="搜索书签..."
          class="w-full pl-9 pr-4 py-2 rounded-full bg-slate-100 dark:bg-slate-700 border-0 focus:ring-2 focus:ring-primary/50 focus:outline-none transition-all text-sm"
        />
        <i class="fa fa-search absolute left-7 top-[58px] text-slate-400"></i>
      </div>
    </header>

    <main class="container mx-auto px-4 py-6">
      <!-- 提示栏 -->
      <div
        id="tipBar"
        class="bg-primary/10 dark:bg-primary/20 border border-primary/20 rounded-xl p-4 mb-6 text-sm flex items-center gap-3"
      >
        <i class="fa fa-info-circle text-primary"></i>
        <p>将浏览器中的链接拖拽到下方区域添加书签，点击卡片打开链接</p>
        <button
          id="hideTip"
          class="ml-auto text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 p-1 rounded-full hover:bg-primary/10 transition-colors"
          title="隐藏提示"
        >
          <i class="fa fa-times text-sm"></i>
        </button>
      </div>

      <!-- 批量操作栏 (默认隐藏) -->
      <div
        id="batchActions"
        class="hidden bg-slate-100 dark:bg-slate-800 rounded-xl p-4 mb-6 flex flex-wrap items-center gap-4"
      >
        <p class="font-medium"><span id="batchCount">0</span> 个书签被选中</p>
        <div class="ml-auto flex gap-3">
          <button
            id="selectAll"
            class="px-3 py-1.5 bg-white dark:bg-slate-700 rounded-lg text-sm hover:bg-slate-50 dark:hover:bg-slate-600 transition-colors"
          >
            全选
          </button>
          <button
            id="deselectAll"
            class="px-3 py-1.5 bg-white dark:bg-slate-700 rounded-lg text-sm hover:bg-slate-50 dark:hover:bg-slate-600 transition-colors"
          >
            取消选择
          </button>
          <button
            id="deleteSelected"
            class="px-3 py-1.5 bg-red-500 text-white rounded-lg text-sm hover:bg-red-600 transition-colors"
          >
            删除所选
          </button>
        </div>
      </div>

      <!-- 书签区域 -->
      <div
        id="board"
        class="board-mobile grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 2xl:grid-cols-8 gap-4 md:gap-5 p-3 bg-white/60 dark:bg-dark-bg/60 backdrop-blur rounded-2xl shadow-md min-h-[auto] transition-all duration-300"
      >
        <!-- 空状态提示 -->
        <div
          id="emptyState"
          class="col-span-full flex flex-col items-center justify-center py-16 text-center hidden"
        >
          <div
            class="w-20 h-20 rounded-full bg-primary/10 flex items-center justify-center mb-4"
          >
            <i class="fa fa-link text-primary text-3xl"></i>
          </div>
          <h3 class="text-lg font-semibold mb-2">暂无书签</h3>
          <p class="text-slate-500 dark:text-slate-400 max-w-md">
            将网页链接拖拽到这里保存，或点击下方按钮手动添加
          </p>
          <button
            id="addManualBtn"
            class="mt-4 px-4 py-2 bg-primary text-white rounded-lg hover:bg-primary/90 transition-colors flex items-center gap-2"
          >
            <i class="fa fa-plus"></i>
            <span>手动添加</span>
          </button>
        </div>
      </div>
    </main>
    <!-- 模态框 -->
    <div
      id="modal"
      class="fixed inset-0 bg-black/50 flex items-center justify-center hidden z-50"
    >
      <div
        class="bg-white dark:bg-slate-800 rounded-xl shadow-lg w-80 p-5 animate-fade-in"
      >
        <h2 id="modalTitle" class="text-lg font-semibold mb-3">提示</h2>
        <p
          id="modalMessage"
          class="text-slate-600 dark:text-slate-300 mb-4"
        ></p>

        <!-- 输入框（默认隐藏） -->
        <input
          id="modalInput"
          type="text"
          class="hidden w-full px-3 py-2 rounded-lg border dark:border-slate-600 bg-slate-50 dark:bg-slate-700 focus:outline-none mb-4"
        />

        <div class="flex justify-end gap-3">
          <button
            id="modalCancel"
            class="px-3 py-1.5 bg-slate-200 dark:bg-slate-700 rounded-lg hover:bg-slate-300 dark:hover:bg-slate-600 transition"
          >
            取消
          </button>
          <button
            id="modalOk"
            class="px-3 py-1.5 bg-primary text-white rounded-lg hover:bg-primary/90 transition"
          >
            确定
          </button>
        </div>
      </div>
    </div>

    <footer
      id="footer"
      class="mt-10 py-6 border-t border-slate-200 dark:border-slate-700 text-center text-sm text-slate-500 dark:text-slate-400 hidden"
    >
      <p>书签数据保存在本地，清除浏览器数据会导致丢失</p>
    </footer>

    <script src="js/app.js?v=7"></script>
  </body>
</html>
