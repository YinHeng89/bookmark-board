<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>书签白板 | 快速整理你的网络资源</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <!-- 防止 FOUC（Flash of Unstyled Content） -->
  <style>
    body {
      margin: 0;
      padding: 0;
      opacity: 0;
      transition: opacity 0.15s ease;
    }
    body.loaded {
      opacity: 1;
    }
  </style>
  
  <link href="css/font-awesome.min.css" rel="stylesheet" />
  <link href="css/main.css?v=3.2.0" rel="stylesheet" />
</head>

<body>
  <!-- 顶部导航栏 -->
  <header class="header">
    <div class="container header-inner">
      <div class="logo">
        <img src="icons/logo.png" alt="书签白板" class="logo-icon" />
        <div class="logo-content">
          <h1 class="logo-text">书签白板</h1>
          <p class="logo-subtitle">隐私优先的本地书签管理工具</p>
        </div>
      </div>

      <div class="header-actions">
        <!-- 搜索框（桌面端） -->
        <div class="search-box">
          <input
            type="text"
            id="search"
            class="search-input"
            placeholder="搜索书签..."
          />
        </div>

        <!-- 移动端搜索按钮 -->
        <button id="mobileSearchBtn" class="search-icon-btn">
          <i class="fa fa-search"></i>
        </button>

        <!-- 批量操作按钮 -->
        <button id="batchBtn" class="icon-btn">
          <i class="fa fa-cog"></i>
          <span id="selectedCount" class="badge">0</span>
        </button>

        <!-- 主题切换按钮 -->
        <button id="themeToggle" class="icon-btn">
          <i class="fa fa-moon-o"></i>
          <i class="fa fa-sun-o" style="display: none;"></i>
        </button>
      </div>
    </div>

    <!-- 移动端搜索框 -->
    <div id="mobileSearch" class="mobile-search">
      <input
        type="text"
        id="mobileSearchInput"
        placeholder="搜索书签..."
      />
    </div>
  </header>

  <!-- 主内容区 -->
  <main class="main">
    <div class="container">
      <!-- 提示栏 -->
      <div id="tipBar" class="tip-bar">
        <i class="fa fa-info-circle tip-icon"></i>
        <p class="tip-text">将浏览器中的链接拖拽到下方区域添加书签，点击卡片打开链接</p>
        <button id="hideTip" class="tip-close" title="隐藏提示">
          <i class="fa fa-times"></i>
        </button>
      </div>

      <!-- 批量操作栏 -->
      <div id="batchActions" class="batch-bar">
        <p class="batch-text"><span id="batchCount">0</span> 个书签被选中</p>
        <div class="batch-actions">
          <button id="selectAll" class="btn btn-default">全选</button>
          <button id="deselectAll" class="btn btn-default">取消选择</button>
          <button id="deleteSelected" class="btn btn-danger">删除所选</button>
        </div>
      </div>

      <!-- 书签区域 -->
      <div id="board" class="board">
        <!-- 空状态提示 -->
        <div id="emptyState" class="empty-state hidden">
          <div class="empty-icon-wrapper">
            <i class="fa fa-link empty-icon"></i>
          </div>
          <h3 class="empty-title">暂无书签</h3>
          <p class="empty-text">将网页链接拖拽到这里保存，或点击下方按钮手动添加</p>
          <button id="addManualBtn" class="btn btn-primary">
            <i class="fa fa-plus"></i>
            <span>手动添加</span>
          </button>
        </div>
      </div>
    </div>
  </main>

  <!-- 模态框 -->
  <div id="modal" class="modal-overlay">
    <div class="modal">
      <h2 id="modalTitle" class="modal-title">提示</h2>
      <p id="modalMessage" class="modal-message"></p>
      <input id="modalInput" type="text" class="modal-input hidden" />
      <div class="modal-actions">
        <button id="modalCancel" class="btn btn-default">取消</button>
        <button id="modalOk" class="btn btn-primary">确定</button>
      </div>
    </div>
  </div>

  <!-- 页脚 -->
  <footer id="footer" class="footer">
    <div class="container footer-content">
      <div class="footer-left">
        <p class="footer-text">书签白板 - 快速整理你的网络资源</p>
      </div>
      <div class="footer-right">
        <span class="footer-version">v3.2.0</span>
        <span class="footer-divider">|</span>
        <span class="footer-text">数据安全存储于本地</span>
      </div>
    </div>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
