<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>书签白板 | 快速整理你的网络资源</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <!-- 防止 FOUC（Flash of Unstyled Content） -->
  <style>
    body {
      margin: 0;
      padding: 0;
      opacity: 0;
      transition: opacity 0.15s ease;
    }
    body.loaded {
      opacity: 1;
    }
  </style>
  
  <link href="css/font-awesome.min.css" rel="stylesheet" />
  <link href="css/main.css?v=3.2.1" rel="stylesheet" />
</head>

<body>
  <!-- 顶部导航栏 -->
  <header class="header">
    <div class="container header-inner">
      <div class="logo">
        <img src="icons/logo.png" alt="书签白板" class="logo-icon" />
        <div class="logo-content">
          <h1 class="logo-text">书签白板 <span class="logo-version">v3.2.1</span></h1>
          <p class="logo-subtitle">隐私优先的本地书签管理工具</p>
        </div>
      </div>

      <div class="header-actions">
        <!-- 搜索框（桌面端） -->
        <div class="search-box">
          <input
            type="text"
            id="search"
            class="search-input"
            placeholder="搜索书签... 支持 #标签 @域名 !分组"
          />
        </div>

        <!-- 移动端搜索按钮 -->
        <button id="mobileSearchBtn" class="search-icon-btn">
          <i class="fa fa-search"></i>
        </button>

        <!-- 主题切换按钮 -->
        <button id="themeToggle" class="icon-btn">
          <i class="fa fa-moon-o"></i>
          <i class="fa fa-sun-o" style="display: none;"></i>
        </button>

        <!-- 设置按钮 -->
        <a href="settings.html" class="icon-btn" title="设置">
          <i class="fa fa-sliders"></i>
        </a>
      </div>
    </div>

    <!-- 移动端搜索框 -->
    <div id="mobileSearch" class="mobile-search">
      <input
        type="text"
        id="mobileSearchInput"
        placeholder="搜索书签... 支持 #标签 @域名 !分组"
      />
    </div>
  </header>

  <!-- 主内容区 -->
  <main class="main">
    <div class="container">
      <!-- 分组筛选区 -->
      <div id="groupsFilter" class="groups-filter">
        <div class="groups-wrapper">
          <div class="groups-container">
            <button class="group-tab active" data-group="all">
              <i class="fa fa-th"></i>
              <span>全部分组</span>
            </button>
            <!-- 动态生成分组标签 -->
            <button id="addGroupBtn" class="add-group-btn" title="新建分组">
              <i class="fa fa-plus"></i>
            </button>
          </div>
        </div>
      </div>
      <!-- 提示栏 -->
      <div id="tipBar" class="tip-bar">
        <i class="fa fa-info-circle tip-icon"></i>
        <p class="tip-text">将浏览器中的链接拖拽到下方区域添加书签，点击卡片打开链接</p>
        <button id="hideTip" class="tip-close" title="隐藏提示">
          <i class="fa fa-times"></i>
        </button>
      </div>

      <!-- Tab 切换和排序 -->
      <div class="view-controls">
        <div id="viewTabs" class="view-tabs">
          <button class="view-tab active" data-view="all">
            <i class="fa fa-bookmark"></i>
            <span>所有书签</span>
            <span id="allCount" class="tab-count">0</span>
          </button>
          <button class="view-tab" data-view="pinned">
            <i class="fa fa-thumb-tack"></i>
            <span>置顶</span>
            <span id="pinnedCount" class="tab-count">0</span>
          </button>
          <button class="view-tab" data-view="recent">
            <i class="fa fa-clock-o"></i>
            <span>最近添加</span>
            <span id="recentCount" class="tab-count">0</span>
          </button>
        </div>
        
        <div class="sort-controls">
          <label class="sort-label">排序：</label>
          <select id="sortSelect" class="sort-select">
            <option value="createdAt-desc">添加时间（新→旧）</option>
            <option value="createdAt-asc">添加时间（旧→新）</option>
            <option value="title-asc">名称（A→Z）</option>
            <option value="title-desc">名称（Z→A）</option>
            <option value="clickCount-desc">使用频率（高→低）</option>
          </select>
        </div>
      </div>

      <!-- 书签展示区 -->
      <div id="board" class="board section-board">
        <!-- 空状态提示 -->
        <div id="emptyState" class="empty-state hidden">
          <div class="empty-icon-wrapper">
            <i class="fa fa-bookmark empty-icon"></i>
          </div>
          <h3 class="empty-title">暂无书签</h3>
          <p class="empty-text">将网页链接拖拽到这里保存，或点击下方按钮手动添加</p>
          <div class="empty-actions">
            <button id="addManualBtn" class="btn btn-primary">
              <i class="fa fa-plus"></i>
              <span>手动添加</span>
            </button>
            <button id="importEmptyBtn" class="btn btn-secondary">
              <i class="fa fa-upload"></i>
              <span>导入数据</span>
            </button>
          </div>
          <input type="file" id="importEmptyFileInput" accept=".json" style="display: none;" />
        </div>
        
        <!-- 置顶分区空状态 -->
        <div id="emptyStatePinned" class="empty-state empty-state-info hidden">
          <div class="empty-icon-wrapper">
            <i class="fa fa-thumb-tack empty-icon"></i>
          </div>
          <h3 class="empty-title">暂无置顶书签</h3>
          <p class="empty-text">右键点击书签卡片，选择“置顶此书签”即可在这里看到</p>
        </div>
        
        <!-- 最近添加分区空状态 -->
        <div id="emptyStateRecent" class="empty-state empty-state-info hidden">
          <div class="empty-icon-wrapper">
            <i class="fa fa-clock-o empty-icon"></i>
          </div>
          <h3 class="empty-title">暂无最近添加</h3>
          <p class="empty-text">最近 7 天内添加的书签会显示在这里</p>
        </div>
      </div>
    </div>
  </main>

  <!-- 模态框 -->
  <div id="modal" class="modal-overlay">
    <div class="modal">
      <h2 id="modalTitle" class="modal-title">提示</h2>
      <p id="modalMessage" class="modal-message"></p>
      <input id="modalInput" type="text" class="modal-input hidden" />
      <div class="modal-actions">
        <button id="modalCancel" class="btn btn-default">取消</button>
        <button id="modalOk" class="btn btn-primary">确定</button>
      </div>
    </div>
  </div>

  <!-- 页脚 -->
  <footer id="footer" class="footer">
    <div class="container footer-content">
      <div class="footer-left">
        <p class="footer-text">书签白板 - 快速整理你的网络资源</p>
      </div>
      <div class="footer-right">
        <span class="footer-text">数据安全存储于本地</span>
      </div>
    </div>
  </footer>

  <script src="js/ai-service.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
