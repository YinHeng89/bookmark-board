<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title data-i18n="app_name">书签白板 | 快速整理你的网络资源</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- 防止 FOUC（Flash of Unstyled Content） -->
  <style>
    body {
      margin: 0;
      padding: 0;
      opacity: 0;
      transition: opacity 0.15s ease;
    }
    body.loaded {
      opacity: 1;
    }
  </style>

  <link href="css/font-awesome.min.css" rel="stylesheet" />
  <link href="css/main.css?v=3.2.12" rel="stylesheet" />
</head>

<body>
  <!-- 顶部导航栏 -->
  <header class="header">
    <div class="container header-inner">
      <div class="logo">
        <img src="icons/logo.png" data-i18n-attr="alt:app_name" alt="书签白板" class="logo-icon" />
        <div class="logo-content">
          <h1 class="logo-text"><span data-i18n="app_name">书签白板</span> <span class="logo-version">v3.2.12</span></h1>
          <p class="logo-subtitle" data-i18n="app_subtitle">隐私优先的本地书签管理工具</p>
        </div>
      </div>

      <div class="header-actions">
        <!-- 搜索框（桌面端） -->
        <div class="search-box">
          <i class="fa fa-search search-icon"></i>
          <input
            type="text"
            id="search"
            class="search-input"
            data-i18n-attr="placeholder:header_search_placeholder"
            placeholder="搜索书签... 支持 #标签 @域名 !分组"
          />
          <button id="searchClearBtn" class="search-clear-btn" style="display:none;" title="清除">
            <i class="fa fa-times"></i>
          </button>
        </div>

        <!-- 排序 -->
        <div class="sort-controls">
          <select id="sortSelect" class="sort-select"></select>
        </div>

        <!-- 移动端搜索按钮 -->
        <button id="mobileSearchBtn" class="search-icon-btn" data-i18n-attr="title:header_mobile_search_title" title="搜索">
          <i class="fa fa-search"></i>
        </button>

        <!-- 主题切换按钮 -->
        <button id="themeToggle" class="icon-btn" data-i18n-attr="title:header_theme_switch_title" title="切换主题">
          <i class="fa fa-moon-o"></i>
          <i class="fa fa-sun-o" style="display: none;"></i>
        </button>

        <!-- 设置按钮 -->
        <a href="settings.html" class="icon-btn" data-i18n-attr="title:header_settings_title" title="设置">
          <i class="fa fa-sliders"></i>
        </a>
      </div>
    </div>

    <!-- 移动端搜索框 -->
    <div id="mobileSearch" class="mobile-search">
      <input
        type="text"
        id="mobileSearchInput"
        data-i18n-attr="placeholder:header_search_placeholder"
        placeholder="搜索书签... 支持 #标签 @域名 !分组"
      />
    </div>
  </header>

  <!-- 主内容区 -->
  <main class="main">
    <div class="container">
      <!-- 分组筛选区 + 排序 -->
      <div id="groupsFilter" class="groups-filter">
        <div class="groups-wrapper">
          <div class="groups-container">
            <button class="group-tab group-tab-fixed active" data-group="all">
              <i class="fa fa-th"></i>
              <span data-i18n="view_tab_all">所有书签</span>
              <span id="allCount" class="tab-count">0</span>
            </button>
            <button class="group-tab group-tab-fixed" data-group="pinned">
              <i class="fa fa-thumb-tack"></i>
              <span data-i18n="view_tab_pinned">置顶</span>
              <span id="pinnedCount" class="tab-count">0</span>
            </button>
            <button class="group-tab group-tab-fixed" data-group="ungrouped">
              <i class="fa fa-folder-o"></i>
              <span data-i18n="view_tab_ungrouped">未分组</span>
              <span id="ungroupedCount" class="tab-count">0</span>
            </button>
            <button class="group-tab group-tab-fixed" data-group="recent">
              <i class="fa fa-clock-o"></i>
              <span data-i18n="view_tab_recent">最近添加</span>
              <span id="recentCount" class="tab-count">0</span>
            </button>
            <span class="group-tab-divider"></span>
            <!-- 动态生成分组标签 -->
            <button id="addGroupBtn" class="add-group-btn" data-i18n-attr="title:group_tab_create" title="新建分组">
              <i class="fa fa-plus"></i>
            </button>
          </div>
        </div>
      </div>
      <!-- 提示栏 -->
      <div id="tipBar" class="tip-bar">
        <i class="fa fa-info-circle tip-icon"></i>
        <p class="tip-text" data-i18n="tip_bar_text">将浏览器中的链接拖拽到下方区域添加书签，点击卡片打开链接</p>
        <button id="hideTip" class="tip-close" data-i18n-attr="title:tip_bar_hide" title="隐藏提示">
          <i class="fa fa-times"></i>
        </button>
      </div>

      <!-- 书签展示区 -->
      <div id="board" class="board section-board">
        <!-- 空状态提示 -->
        <div id="emptyState" class="empty-state hidden">
          <div class="empty-icon-wrapper">
            <i class="fa fa-bookmark empty-icon"></i>
          </div>
          <h3 class="empty-title" data-i18n="empty_all_title">暂无书签</h3>
          <p class="empty-text" data-i18n="empty_all_text">将网页链接拖拽到这里保存，或点击下方按钮手动添加</p>
          <div class="empty-actions">
            <button id="addManualBtn" class="btn btn-primary">
              <i class="fa fa-plus"></i>
              <span data-i18n="empty_all_add_btn">手动添加</span>
            </button>
            <button id="importEmptyBtn" class="btn btn-secondary">
              <i class="fa fa-upload"></i>
              <span data-i18n="empty_all_import_btn">导入数据</span>
            </button>
          </div>
          <input type="file" id="importEmptyFileInput" accept=".json" style="display: none;" />
        </div>
      </div>
    </div>
  </main>

  <!-- 模态框 -->
  <div id="modal" class="modal-overlay">
    <div class="modal">
      <h2 id="modalTitle" class="modal-title" data-i18n="modal_default_title">提示</h2>
      <p id="modalMessage" class="modal-message"></p>
      <input id="modalInput" type="text" class="modal-input hidden" />
      <div class="modal-actions">
        <button id="modalCancel" class="btn btn-default" data-i18n="cancel">取消</button>
        <button id="modalOk" class="btn btn-primary" data-i18n="confirm">确定</button>
      </div>
    </div>
  </div>

  <!-- 页脚 -->
  <footer id="footer" class="footer">
    <div class="container footer-content">
      <div class="footer-left">
        <p class="footer-text" data-i18n="footer_text">书签白板 - 快速整理你的网络资源</p>
      </div>
      <div class="footer-right">
        <span class="footer-text" data-i18n="footer_storage">数据安全存储于本地</span>
      </div>
    </div>
  </footer>

  <script src="js/modules/i18n.js"></script>
  <script src="js/ai-service.js"></script>
  <script src="js/modules/modal.js"></script>
  <script src="js/modules/toast.js"></script>
  <script src="js/modules/data-manager.js"></script>
  <script src="js/modules/ui-renderer.js"></script>
  <script src="js/modules/bookmark-ops.js"></script>
  <script src="js/modules/group-manager.js"></script>
  <script src="js/modules/ai-integration.js"></script>
  <script src="js/app-refactored.js"></script>
</body>
</html>
